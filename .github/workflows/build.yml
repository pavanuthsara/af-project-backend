name: CI Build Check

# Trigger the workflow on push or pull request events for the main branch
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    # Optional: If your build/test needs a live DB connection
    # services:
    #   mongodb:
    #     image: mongo:latest
    #     ports:
    #       - 27017:27017

    strategy:
      matrix:
        node-version: [18.x, 20.x] # Test against current LTS versions

    steps:
      # 1. Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      # 3. Setup Node.js
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm" # Built-in caching for faster builds

      # 4. Install Dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Run Build Script
      # Ensure you have a "build" script in your package.json
      # - name: Run Build
      #   run: pnpm run build
      - name: Check Syntax
        run: node --check index.js

      # 6. Run Unit Tests
      - name: Run Unit Tests
        run: pnpm run test:unit
